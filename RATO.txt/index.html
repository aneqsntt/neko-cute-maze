<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mabel game - 10 Levels Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            image-rendering: pixelated;
        }

        body {
            background-color: #ffdeeb; 
            font-family: 'Press Start 2P', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            width: 440px;
            padding: 0 6px;
            color: #ff527b;
            font-size: 10px;
        }

        .mbox {
            background-color: #fff3f8;
            padding: 16px;
            border: 6px solid #ffb7d5;
            border-radius: 20px;
            box-shadow: 0 8px 0 #e096b7;
            position: relative;
        }

        #screen {
            position: relative;
            width: 400px;
            height: 400px;
            background-color: #eaf9ff; 
            border: 6px solid #7cd3fc;
            border-radius: 8px;
            overflow: hidden;
        }

        /* --- INTERFACE INICIAL --- */
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #fff0f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 500;
            gap: 24px;
            text-align: center;
            padding: 20px;
        }

        #start-screen h1 {
            font-size: 18px;
            color: #ff7da7;
            text-shadow: 3px 3px 0px #ffb7d5;
            line-height: 1.5;
        }

        #start-screen .sub {
            font-size: 8px;
            color: #b388ff;
        }

        .start-btn {
            padding: 12px 24px;
            background-color: #7cd3fc;
            border: 4px solid #fff;
            box-shadow: 0 6px 0 #4ba3cb;
            color: white;
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            cursor: pointer;
            border-radius: 8px;
            animation: blink 1.2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .start-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #4ba3cb;
        }

        /* --- ELEMENTOS DO JOGO --- */
        #maze-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Grid do Labirinto */
        .grid-cell {
            position: absolute;
            width: 40px;
            height: 40px;
            box-sizing: border-box;
        }

        /* Paredes baseadas nas bordas da célula */
        .wall-top { border-top: 6px solid #b388ff; }
        .wall-bottom { border-bottom: 6px solid #b388ff; }
        .wall-left { border-left: 6px solid #b388ff; }
        .wall-right { border-right: 6px solid #b388ff; }

        .character {
            position: absolute;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            z-index: 100;
            transition: left 0.08s ease, top 0.08s ease;
        }

        .zap {
            background-color: rgba(255, 0, 0, 0.4);
            border-radius: 50%;
            transform: scale(1.2);
        }

        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(-3px, 2px); }
            40% { transform: translate(3px, -2px); }
            60% { transform: translate(-2px, -2px); }
            80% { transform: translate(2px, 2px); }
        }

        .shake-screen {
            animation: shake 0.15s linear 2;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-4px) scale(1.1); }
        }

        #home {
            animation: float 1.5s infinite ease-in-out;
        }

        /* --- CONTROLES VIRTUAIS --- */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .buttons-row {
            display: flex;
            gap: 6px;
        }

        .btn {
            width: 48px;
            height: 48px;
            background-color: #fff;
            border: 4px solid #ffb7d5;
            border-radius: 12px;
            color: #ff7da7;
            font-size: 14px;
            font-family: 'Press Start 2P', monospace;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 #ffb7d5;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #ffb7d5;
        }
    </style>
</head>
<body>

    <div id="container">
        <div class="hud">
            <span>LVL:<span id="level-txt">1</span>/10</span>
            <span>HP:<span id="hearts">💖💖💖</span></span>
            <span>SHOCKS:<span id="shock-txt">0</span></span>
        </div>

        <div class="mbox">
            <div id="screen">
                <!-- TELA DE ENTRADA -->
                <div id="start-screen">
                    <h1>NEKO RUN:<br>10 CHALLENGES</h1>
                    <div class="sub">CADA NÍVEL FICA MAIS DIFÍCIL!</div>
                    <button class="start-btn" onclick="startGame()">START GAME</button>
                </div>

                <!-- ÁREA DO LABIRINTO -->
                <div id="maze-container">
                    <div id="thingie" class="character">🐱</div>
                    <div id="home" class="character">🌟</div>
                    <div id="grid-group"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" id="bu">▲</button>
            <div class="buttons-row">
                <button class="btn" id="bl">◀</button>
                <button class="btn" id="bd">▼</button>
                <button class="btn" id="br">▶</button>
            </div>
        </div>
    </div>

    <script>
        const player = document.getElementById('thingie');
        const target = document.getElementById('home');
        const gridGroup = document.getElementById('grid-group');
        const screen = document.getElementById('screen');
        
        const levelTxt = document.getElementById('level-txt');
        const heartsTxt = document.getElementById('hearts');
        const shockTxt = document.getElementById('shock-txt');

        let currentLevel = 1;
        let gridX = 0, gridY = 0; // Posição lógica na matriz (0 a 9)
        let lives = 3, shocks = 0;
        let isInvincible = false;
        
        const cellSize = 38.8; // Tamanho ideal para caber a matriz 10x10 perfeitamente na tela
        const offset = 6; // Ajuste fino centralizado das paredes
        const cols = 10, rows = 10;
        let mazeGrid = [];

        // Sementes fixas para gerar os 10 níveis. Todos foram validados para ter saída!
        const levelSeeds = [0.15, 0.42, 0.88, 0.23, 0.61, 0.74, 0.35, 0.59, 0.91, 0.11];

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            currentLevel = 1;
            lives = 3;
            shocks = 0;
            loadLevel(currentLevel);
        }

        // Algoritmo de geração que cria labirintos 100% passáveis
        function generatePerfectMaze(seedValue) {
            let grid = [];
            for (let r = 0; r < rows; r++) {
                grid[r] = [];
                for (let c = 0; c < cols; c++) {
                    grid[r][c] = { r, c, walls: [true, true, true, true], visited: false }; // Top, Right, Bottom, Left
                }
            }

            // Criação de caminhos garantidos usando árvore geradora pseudo-aleatória por semente
            let stack = [];
            let current = grid[0][0];
            current.visited = true;
            
            let pseudoRandomCount = seedValue;

            function getPseudoRandom() {
                let x = Math.sin(pseudoRandomCount++) * 10000;
                return x - Math.floor(x);
            }

            while (true) {
                let neighbors = [];
                let { r, c } = current;

                if (r > 0 && !grid[r - 1][c].visited) neighbors.push({ cell: grid[r - 1][c], dir: 0 });
                if (c < cols - 1 && !grid[r][c + 1].visited) neighbors.push({ cell: grid[r][c + 1], dir: 1 });
                if (r < rows - 1 && !grid[r + 1][c].visited) neighbors.push({ cell: grid[r + 1][c], dir: 2 });
                if (c > 0 && !grid[r][c - 1].visited) neighbors.push({ cell: grid[r][c - 1], dir: 3 });

                if (neighbors.length > 0) {
                    let nextIdx = Math.floor(getPseudoRandom() * neighbors.length);
                    let next = neighbors[nextIdx];

                    // Remove a parede entre a célula atual e a escolhida
                    current.walls[next.dir] = false;
                    next.cell.walls[(next.dir + 2) % 4] = false;

                    next.cell.visited = true;
                    stack.push(current);
                    current = next.cell;
                } else if (stack.length > 0) {
                    current = stack.pop();
                } else {
                    break;
                }
            }

            // Adiciona maior facilidade nos primeiros níveis removendo paredes extras aleatórias
            if (currentLevel < 6) {
                for (let i = 0; i < (7 - currentLevel) * 4; i++) {
                    let r = Math.floor(getPseudoRandom() * (rows - 2)) + 1;
                    let c = Math.floor(getPseudoRandom() * (cols - 2)) + 1;
                    grid[r][c].walls[Math.floor(getPseudoRandom() * 4)] = false;
                }
            }

            return grid;
        }

        function loadLevel(lvl) {
            levelTxt.innerText = lvl;
            shockTxt.innerText = shocks;
            updateHearts();

            // Gera o labirinto do nível atual
            mazeGrid = generatePerfectMaze(levelSeeds[lvl - 1]);

            // Reseta posições do Gato (Início: Superior Esquerdo)
            gridX = 0;
            gridY = 0;
            updatePlayerPosition();

            // Posiciona a Estrela (Fim: Inferior Direito)
            target.style.left = ((cols - 1) * cellSize + offset + 6) + 'px';
            target.style.top = ((rows - 1) * cellSize + offset + 6) + 'px';

            // Renderiza visualmente as células e suas respectivas paredes
            gridGroup.innerHTML = '';
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cellData = mazeGrid[r][c];
                    const cellEl = document.createElement('div');
                    cellEl.className = 'grid-cell';
                    cellEl.style.left = (c * cellSize + offset) + 'px';
                    cellEl.style.top = (r * cellSize + offset) + 'px';

                    if (cellData.walls[0]) cellEl.classList.add('wall-top');
                    if (cellData.walls[1]) cellEl.classList.add('wall-right');
                    if (cellData.walls[2]) cellEl.classList.add('wall-bottom');
                    if (cellData.walls[3]) cellEl.classList.add('wall-left');

                    gridGroup.appendChild(cellEl);
                }
            }
        }

        function updatePlayerPosition() {
            player.style.left = (gridX * cellSize + offset + 6) + 'px';
            player.style.top = (gridY * cellSize + offset + 6) + 'px';
        }

        function move(dir) {
            if (lives <= 0) return;

            const currentCell = mazeGrid[gridY][gridX];

            if (dir === 'up') {
                if (!currentCell.walls[0]) { gridY--; updatePlayerPosition(); checkWin(); } 
                else { triggerShock(); }
            }
            if (dir === 'right') {
                if (!currentCell.walls[1]) { gridX++; updatePlayerPosition(); checkWin(); } 
                else { triggerShock(); }
            }
            if (dir === 'down') {
                if (!currentCell.walls[2]) { gridY++; updatePlayerPosition(); checkWin(); } 
                else { triggerShock(); }
            }
            if (dir === 'left') {
                if (!currentCell.walls[3]) { gridX--; updatePlayerPosition(); checkWin(); } 
                else { triggerShock(); }
            }
        }

        function triggerShock() {
            if (isInvincible) return;
            isInvincible = true;
            shocks++;
            lives--;
            
            shockTxt.innerText = shocks;
            updateHearts();

            screen.classList.add('shake-screen');
            player.classList.add('zap');

            if (lives <= 0) {
                setTimeout(() => {
                    alert('⚡ GAME OVER! Seus corações acabaram! Voltando ao nível 1. ⚡');
                    document.getElementById('start-screen').style.display = 'flex';
                    screen.classList.remove('shake-screen');
                    player.classList.remove('zap');
                    isInvincible = false;
                }, 300);
                return;
            }

            setTimeout(() => {
                screen.classList.remove('shake-screen');
                player.classList.remove('zap');
                isInvincible = false;
            }, 300);
        }

        function updateHearts() {
            heartsTxt.innerText = "💖".repeat(Math.max(0, lives)) + "💔".repeat(Math.max(0, 3 - lives));
        }

        function checkWin() {
            if (gridX === cols - 1 && gridY === rows - 1) {
                setTimeout(() => {
                    if (currentLevel < 10) {
                        currentLevel++;
                        alert(`🌟 NÍVEL ${currentLevel - 1} CONCLUÍDO! Avançando para o Nível ${currentLevel}... 🌟`);
                        loadLevel(currentLevel);
                    } else {
                        alert('🎉 INCRÍVEL! Você dominou o sistema elétrico e completou todos os 10 Níveis! 🎉');
                        document.getElementById('start-screen').style.display = 'flex';
                    }
                }, 150);
            }
        }

        // Eventos do teclado físico (WASD e Setas)
        window.addEventListener('keydown', (e) => {
            if (document.getElementById('start-screen').style.display === 'none') {
                if (e.key === 'ArrowUp' || e.key.toLowerCase() === 'w') move('up');
                if (e.key === 'ArrowDown' || e.key.toLowerCase() === 's') move('down');
                if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') move('left');
                if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') move('right');
            }
        });

        // Controles Virtuais da Tela
        document.getElementById('bu').addEventListener('click', () => move('up'));
        document.getElementById('bd').addEventListener('click', () => move('down'));
        document.getElementById('bl').addEventListener('click', () => move('left'));
        document.getElementById('br').addEventListener('click', () => move('right'));
    </script>
</body>
</html>
